<!DOCTYPE html>
<html>
<body>
    <form id="studentForm">
        <input type="text" id="sId" placeholder="Student ID">
        <input type="text" id="sName" placeholder="Name">
        <input type="text" id="sDept" placeholder="Department">
        <input type="number" id="sMarks" placeholder="Marks">
        <button type="button" onclick="addStudent()">Add Student</button>
    </form>
    <table id="studentTable" border="1">
        <thead>
            <tr><th>ID</th><th>Name</th><th>Dept</th><th>Marks</th><th>Action</th></tr>
        </thead>
        <tbody></tbody>
    </table>
    <div id="msg"></div>
    <script src="script.js"></script>
</body>
</html>
