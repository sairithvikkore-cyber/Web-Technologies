<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Audio Video</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h3>Audio Player</h3>
<audio id="a" controls>
<source src="sample.mp3" type="audio/mpeg">
</audio>
<p id="atime">0</p>

<h3>Video Player</h3>
<video id="v" width="400" controls>
<source src="sample.mp4" type="video/mp4">
</video>
<p id="vtime">0</p>

<script src="script.js"></script>
</body>
</html>
