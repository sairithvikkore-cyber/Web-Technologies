<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Task Manager</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<input id="tname" type="text">
<button onclick="addTask()">Add Task</button>
<p id="msg"></p>

<div class="board">
<div class="col" id="todo" ondragover="event.preventDefault()" ondrop="drop(event)">To Do</div>
<div class="col" id="progress" ondragover="event.preventDefault()" ondrop="drop(event)">In Progress</div>
<div class="col" id="done" ondragover="event.preventDefault()" ondrop="drop(event)">Completed</div>
</div>

<script src="script.js"></script>
</body>
</html>
