<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Card</title>
<style>
.card{border:1px solid #ccc;padding:15px;width:250px;box-shadow:0 4px 8px rgba(0,0,0,0.2)}
.card img{width:100%}
.card button{background:#28a745;color:#fff;border:none;padding:10px;width:100%;cursor:pointer}
.card button:hover{background:#218838}
</style>
</head>
<body>
<div class="card">
<img src="https://via.placeholder.com/250">
<h3>Sample Product</h3>
<p>Simple product description.</p>
<p>Price: $20</p>
<button>Buy Now</button>
</div>
</body>
</html>
